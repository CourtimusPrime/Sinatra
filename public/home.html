<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Top Tracks</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="home-container">
        <h2>Your Top Tracks This Month</h2>
        <div class="track-list">
            <div class="track">
                <span class="rank">1</span>
                <img src="images/track1.jpg" class="album-cover">
                <p class="song-title">Fly Away</p>
                <p class="artist">Lenny Kravitz</p>
            </div>
            <div class="track">
                <span class="rank">2</span>
                <img src="images/track2.jpg" class="album-cover">
                <p class="song-title">Nutshell</p>
                <p class="artist">Alice in Chains</p>
            </div>
            <div class="track">
                <span class="rank">3</span>
                <img src="images/track3.jpg" class="album-cover">
                <p class="song-title">Lithium</p>
                <p class="artist">Nirvana</p>
            </div>
        </div>
    </div>
</body>
</html>
