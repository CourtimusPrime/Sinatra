<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{username}</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="./png/favicon.ico" />
</head>
<body>
    <!-- Profile Section -->
    <div id="profile" style="display: none;"> <!-- Hidden until user is fetched -->
        <img id="profile-pic" src="https://wallpapers.com/images/hd/mr-bean-1600-x-1600-picture-sa8hx6eb7w4ne5k1.jpg" alt="Profile Picture">
        <h2 id="username"></h2>
    </div>

    <!-- Featured Playlists -->
    <div id="featured-playlists">
        <h3>⭐️ Featured Playlists:</h3>
        <ul id="playlist-list"></ul>
        <a id="see-all-link" href="/playlists/view">See all playlists</a>
    </div>

    <!-- Title Section -->
    <h1 id="page-title">Your Top Tracks This Month</h1>

    <!-- Track List -->
    <div id="track-container"></div>

    <!-- Settings Button -->
    <button id="settings-button">⚙️ Settings</button>

    <!-- Settings Panel (Hidden by default) -->
    <div id="settings-panel" style="display: none;">
        <div class="search-container">
            <input id="search-bar" placeholder="Search...">
        </div>

        <!-- Playlist Results -->
        <div id="playlist-results"></div>
    </div>

    <!-- JavaScript -->
    <script src="/app.js"></script>
    <!-- Add this inside the <body> tag -->
<button id="logout-button" class="logout-button">🚪 Log Out</button>
</body>
</html>
