<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Top Tracks This Month</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Login Container -->
    <div id="login-container">
        <a id="login-link" href="/login">Login with Spotify</a>
    </div>

    <!-- Profile Section -->
    <div id="profile" style="display: none;"> <!-- Hidden until user is fetched -->
        <img id="profile-pic" src="https://i.scdn.co/image/ab6761610000e5eb02a6ef4ad94c55bdf8bc9d52" alt="Profile Picture">
        <h2 id="username"></h2>
    </div>

    <!-- Title Section -->
    <h1 id="page-title">Your Top Tracks This Month</h1>

    <!-- Track List -->
    <div id="track-container"></div>

    <!-- Search Bar -->
    <div class="search-container">
        <input id="search-bar" placeholder="Search playlists...">
    </div>
    <!-- Playlist List-->
     <div id="playlist-container"></div>

    <!-- JavaScript -->
    <script src="/spotify.js"></script>
</body>
</html>
