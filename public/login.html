<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinatra - Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="login-wrapper">
    <h1>Welcome to Sinatra</h1>
    <div id="login-buttons">
      <p>Loading login options...</p>
    </div>
  </div>

  <script>
    async function loadPlatforms() {
      try {
        const res = await fetch('/login/platforms');
        const platforms = await res.json();

        const container = document.getElementById('login-buttons');
        container.innerHTML = '';

        platforms.forEach(({ id, name, icon }) => {
          const btn = document.createElement('a');
          btn.href = `/login/${id}`;
          btn.className = 'login-btn';
          btn.textContent = `${icon} Sign in with ${name}`;
          container.appendChild(btn);
        });

        console.log("✅ Login options loaded:", platforms);
      } catch (err) {
        console.error("❌ Failed to load login options:", err);
        document.getElementById('login-buttons').innerText = "Failed to load login options.";
      }
    }

    loadPlatforms();
  </script>
</body>
</html>
